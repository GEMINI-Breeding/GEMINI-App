name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Frontend unit (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: npm run test:unit -- --run --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 14

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create repo .env for test config
        run: |
          cp .env.example .env

      - name: Sync backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Pull ODM Docker image (for pipeline-orthomosaic.spec.ts)
        run: docker pull opendronemap/odm

      - name: Start backend (uvicorn)
        working-directory: backend
        env:
          APP_DATA_ROOT: ${{ runner.temp }}/gemi-test-data
          # Backend reads FRONTEND_HOST into its CORS allowlist. The Playwright
          # dev server in this repo runs on 5273 (see playwright.config.ts).
          FRONTEND_HOST: http://localhost:5273
        run: |
          mkdir -p "$APP_DATA_ROOT"
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 > "$RUNNER_TEMP/backend.log" 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/api/v1/utils/health-check/ > /dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 2
          done
          echo "backend failed to start"; cat "$RUNNER_TEMP/backend.log"; exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: npx playwright test --project=e2e-setup --project=e2e-workflows

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: ${{ runner.temp }}/backend.log
          retention-days: 14
