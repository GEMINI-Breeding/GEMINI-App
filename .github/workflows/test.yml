name: Tests

on:
  push:
    branches: [main, migration/geminibase]
  pull_request:
    branches: [main, migration/geminibase]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Frontend unit (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: npm run test:unit -- --run --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 14

  backend-unit:
    name: Backend unit (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==2.*

      - name: Install backend deps (no virtualenv)
        run: |
          poetry config virtualenvs.create false
          poetry install --no-root --with test

      - name: Run backend unit tests
        run: |
          # Use the existing fast unit-test suite. Integration tests that
          # require infra live under tests/integration and are run separately
          # by the compose-smoke job below.
          python -m pytest tests/unit -q

  compose-smoke:
    name: Compose stack smoke
    # Brings the GEMINIbase backend stack up from the root docker-compose.yaml
    # (which `include:`s backend/gemini/pipeline/docker-compose.yaml) and hits
    # the health + schema endpoints. This verifies the submodule-pointer +
    # compose-include plumbing on every push, which was silently broken for
    # all of Phases 0-3 under the previous workflow.
    runs-on: ubuntu-latest
    needs: [unit, backend-unit]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Seed .env files
        run: |
          # scripts/setup-backend.sh runs submodule init + .env seeding.
          bash scripts/setup-backend.sh

      - name: Bring up the core stack (db, storage, rest-api, logger, titiler)
        run: |
          docker compose -f docker-compose.yaml up -d --build \
            rest-api db storage storage-init logger titiler

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/healthz > /dev/null; then
              echo "rest-api healthy"; exit 0
            fi
            sleep 3
          done
          echo "rest-api failed to become healthy"
          docker compose -f docker-compose.yaml logs rest-api
          exit 1

      - name: Sanity — all 28+ controllers register
        run: |
          curl -sf http://localhost:7777/schema/openapi.json \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); n=len(d["paths"]); print(f"{n} paths registered"); assert n > 180, f"expected >180 paths, got {n}"'

      - name: Dump rest-api logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml logs rest-api

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yaml down -v

  e2e-playwright:
    name: Frontend E2E (Playwright)
    # Kept as a non-blocking signal during Phase 4 so we can see progress as
    # SDK call sites get rewritten. Flip `continue-on-error: false` once
    # Phase 4 lands and all `/api/v1/*` paths have been replaced.
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: [compose-smoke]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Seed .env files
        run: bash scripts/setup-backend.sh

      - name: Bring up the full stack
        run: |
          docker compose -f docker-compose.yaml up -d --build \
            rest-api db storage storage-init logger titiler \
            geminibase-worker-ml geminibase-worker-geo geminibase-worker-flir

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:7777/healthz > /dev/null; then exit 0; fi
            sleep 3
          done
          docker compose -f docker-compose.yaml logs rest-api
          exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yaml down -v
